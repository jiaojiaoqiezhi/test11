<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAN总线逐位仲裁机制交互学习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bit-cell { transition: all 0.3s ease; }
        .node-active { border-left: 4px solid #3b82f6; }
        .node-lost { border-left: 4px solid #ef4444; opacity: 0.6; }
        .node-winner { border-left: 4px solid #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        .dominant { background-color: #1e3a8a; color: white; } /* 0 - 显性 */
        .recessive { background-color: #d1d5db; color: #374151; } /* 1 - 隐性 */
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(234, 179, 8, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); }
        }
        .winner-anim { animation: pulse-gold 2s infinite; }
    </style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const katexOptions = {
        delimiters: [
            {left: '\\[', right: '\\]', display: true},
            {left: '\\(', right: '\\)', display: false},
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
        ],
        throwOnError: false,
        strict: false,
        trust: true
    };

    let renderTimeout;
    function safeRender() {
        if (renderTimeout) clearTimeout(renderTimeout);
        renderTimeout = setTimeout(() => {
            renderMathInElement(document.body, katexOptions);
        }, 100);
    }

    renderMathInElement(document.body, katexOptions);

    const observer = new MutationObserver((mutations) => {
        let shouldRender = false;
        mutations.forEach((mutation) => {
            if (mutation.target &&
                mutation.target.className &&
                typeof mutation.target.className === 'string' &&
                mutation.target.className.includes('katex')) {
                return;
            }
            shouldRender = true;
        });

        if (shouldRender) {
            safeRender();
        }
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true
    });

    setInterval(() => {
        const text = document.body.innerText;
        if (text.includes('\\(') || text.includes('$$')) {
            safeRender();
        }
    }, 2000);
});
</script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-5xl mx-auto p-4 lg:p-8">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">CAN总线：逐位仲裁机制</h1>
            <p class="text-slate-600 mt-2">基于“线与”逻辑的非破坏性冲突解决演示</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Sidebar: Inputs and Logic -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold mb-4 flex items-center">
                        <span class="w-2 h-6 bg-blue-500 rounded-full mr-2"></span>
                        配置节点 ID
                    </h2>
                    <div id="node-inputs" class="space-y-4">
                        <!-- Node 1 -->
                        <div>
                            <label class="text-sm font-medium text-slate-500">节点 A (Hex: 0x000-0x7FF)</label>
                            <input type="text" id="id-0" value="123" class="w-full mt-1 px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例如: 123">
                        </div>
                        <!-- Node 2 -->
                        <div>
                            <label class="text-sm font-medium text-slate-500">节点 B (Hex)</label>
                            <input type="text" id="id-1" value="124" class="w-full mt-1 px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <!-- Node 3 -->
                        <div>
                            <label class="text-sm font-medium text-slate-500">节点 C (Hex)</label>
                            <input type="text" id="id-2" value="100" class="w-full mt-1 px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                    <div class="mt-6 flex gap-2">
                        <button id="btn-start" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition">开始模拟</button>
                        <button id="btn-reset" class="px-4 py-2 border border-slate-300 hover:bg-slate-50 rounded-lg transition">重置</button>
                    </div>
                </div>

                <div class="bg-blue-50 p-6 rounded-xl border border-blue-100">
                    <h2 class="text-sm font-bold text-blue-800 uppercase tracking-wider mb-2">物理层逻辑</h2>
                    <div class="text-sm text-blue-900 space-y-2">
                        <p><strong>线与原理：</strong> \[ \text{Bus} = \text{Node}_A \cdot \text{Node}_B \cdot \text{Node}_C \]</p>
                        <p>只要有一个节点发送<strong>0 (显性)</strong>，总线即为0。</p>
                        <p><strong>仲裁规则：</strong> 节点发送1但回读到0，则立即退出。</p>
                        <p><strong>优先级：</strong> ID数值越小，优先级越高。</p>
                    </div>
                </div>
            </div>

            <!-- Main Panel: Visualization -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-semibold">位仲裁时序图</h2>
                        <div id="step-info" class="text-sm font-mono bg-slate-100 px-3 py-1 rounded">
                            等待开始...
                        </div>
                    </div>

                    <!-- Visual Timeline -->
                    <div class="relative overflow-x-auto pb-4">
                        <div class="min-w-[600px]">
                            <!-- Header: Bit indices -->
                            <div class="flex mb-2 ml-24">
                                <div class="w-8 text-center text-xs text-slate-400 font-bold">MSB</div>
                                <div class="flex-1 flex justify-around">
                                    <template id="bit-header-tmpl">
                                        <div class="w-8 text-center text-xs text-slate-400">#</div>
                                    </template>
                                    <div id="bit-labels" class="flex w-full justify-around"></div>
                                </div>
                                <div class="w-8 text-center text-xs text-slate-400 font-bold">LSB</div>
                            </div>

                            <!-- Nodes Display -->
                            <div id="simulation-track" class="space-y-4">
                                <!-- Node rows will be injected here -->
                            </div>

                            <!-- Bus Line -->
                            <div class="mt-8 pt-4 border-t-2 border-dashed border-slate-200">
                                <div class="flex items-center">
                                    <div class="w-24 text-sm font-bold text-slate-700">总线状态</div>
                                    <div id="bus-row" class="flex-1 flex justify-around px-1">
                                        <!-- Bus bits will be injected here -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Controls & Legend -->
                    <div class="mt-8 flex flex-wrap items-center justify-between gap-4">
                        <div class="flex gap-4 text-xs">
                            <div class="flex items-center gap-1">
                                <div class="w-3 h-3 dominant rounded-sm"></div> <span>0 (显性)</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <div class="w-3 h-3 recessive rounded-sm border"></div> <span>1 (隐性)</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <div class="w-3 h-3 bg-red-500 rounded-sm"></div> <span>仲裁失败</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <div class="w-3 h-3 bg-green-500 rounded-sm"></div> <span>获胜</span>
                            </div>
                        </div>
                        <div id="playback-controls" class="hidden flex gap-2">
                            <button id="btn-next" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition">
                                下一位 (Step)
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Explanation Box -->
                <div id="log-box" class="bg-slate-800 text-slate-300 p-4 rounded-xl font-mono text-sm h-32 overflow-y-auto">
                    > 系统就绪。请输入ID并点击开始模拟。<br>
                    > 注意：CAN标准帧ID为11位。
                </div>
            </div>
        </div>
    </div>

    <script>
        const ID_LEN = 11;
        let currentStep = -1;
        let nodes = [];
        let busData = [];
        let isComplete = false;

        const btnStart = document.getElementById('btn-start');
        const btnReset = document.getElementById('btn-reset');
        const btnNext = document.getElementById('btn-next');
        const logBox = document.getElementById('log-box');
        const simulationTrack = document.getElementById('simulation-track');
        const busRow = document.getElementById('bus-row');
        const playbackControls = document.getElementById('playback-controls');
        const stepInfo = document.getElementById('step-info');

        function log(msg, color = 'text-slate-300') {
            const div = document.createElement('div');
            div.className = color;
            div.innerHTML = `> ${msg}`;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function hexToBin(hex) {
            let val = parseInt(hex, 16);
            if (isNaN(val)) return null;
            return val.toString(2).padStart(ID_LEN, '0').slice(-ID_LEN);
        }

        function initSim() {
            nodes = [];
            busData = Array(ID_LEN).fill(null);
            currentStep = -1;
            isComplete = false;

            for (let i = 0; i < 3; i++) {
                const hexVal = document.getElementById(`id-${i}`).value;
                const binStr = hexToBin(hexVal);
                if (binStr === null) {
                    alert(`节点 ${String.fromCharCode(65 + i)} 的ID输入无效`);
                    return false;
                }
                nodes.push({
                    name: `节点 ${String.fromCharCode(65 + i)}`,
                    id: hexVal,
                    bits: binStr.split('').map(Number),
                    status: 'active', // active, lost, winner
                    lostAt: -1
                });
            }

            renderInitial();
            btnStart.disabled = true;
            btnStart.classList.add('opacity-50');
            playbackControls.classList.remove('hidden');
            log("模拟开始：逐位比较最高有效位 (MSB)...");
            return true;
        }

        function renderInitial() {
            simulationTrack.innerHTML = '';
            busRow.innerHTML = '';
            
            // Render ID labels
            const labelsDiv = document.getElementById('bit-labels');
            labelsDiv.innerHTML = '';
            for(let i=0; i<ID_LEN; i++) {
                const d = document.createElement('div');
                d.className = 'w-8 text-center text-xs text-slate-400';
                d.innerText = 10 - i;
                labelsDiv.appendChild(d);
            }

            nodes.forEach((node, idx) => {
                const row = document.createElement('div');
                row.id = `node-row-${idx}`;
                row.className = `flex items-center p-2 rounded-lg border border-transparent transition-all node-active bg-white`;
                
                let bitsHtml = '';
                node.bits.forEach((bit, bIdx) => {
                    bitsHtml += `<div id="node-${idx}-bit-${bIdx}" class="bit-cell w-8 h-8 flex items-center justify-center rounded-sm mx-auto text-sm font-bold border border-slate-100 ${bit === 0 ? 'bg-slate-200' : 'bg-white'}">${bit}</div>`;
                });

                row.innerHTML = `
                    <div class="w-24 shrink-0">
                        <div class="font-bold text-slate-700">${node.name}</div>
                        <div class="text-[10px] text-slate-400">ID: 0x${node.id.padStart(3,'0')}</div>
                    </div>
                    <div class="flex-1 flex justify-around px-1">${bitsHtml}</div>
                `;
                simulationTrack.appendChild(row);
            });

            for (let i = 0; i < ID_LEN; i++) {
                const b = document.createElement('div');
                b.id = `bus-bit-${i}`;
                b.className = 'w-8 h-8 flex items-center justify-center rounded-sm border-2 border-slate-200 text-slate-300 font-bold';
                b.innerText = '?';
                busRow.appendChild(b);
            }
        }

        function runStep() {
            if (isComplete) return;

            currentStep++;
            stepInfo.innerText = `当前比较位: ID[${10 - currentStep}]`;

            // 1. Determine Bus Bit (Wired-AND: 0 wins)
            let currentBusBit = 1;
            nodes.forEach(node => {
                if (node.status === 'active' && node.bits[currentStep] === 0) {
                    currentBusBit = 0;
                }
            });
            busData[currentStep] = currentBusBit;

            // Update UI for bus
            const busEl = document.getElementById(`bus-bit-${currentStep}`);
            busEl.innerText = currentBusBit;
            busEl.className = `w-8 h-8 flex items-center justify-center rounded-sm font-bold border-2 ${currentBusBit === 0 ? 'dominant border-blue-900' : 'recessive border-slate-400'}`;

            // 2. Each active node compares read-back value
            let activeCount = 0;
            nodes.forEach((node, idx) => {
                if (node.status !== 'active') return;

                const bitEl = document.getElementById(`node-${idx}-bit-${currentStep}`);
                bitEl.classList.remove('bg-white', 'bg-slate-200');
                bitEl.classList.add(node.bits[currentStep] === 0 ? 'dominant' : 'recessive');

                // Logic: Sent Recessive (1), but Bus is Dominant (0) -> Lose
                if (node.bits[currentStep] === 1 && currentBusBit === 0) {
                    node.status = 'lost';
                    node.lostAt = currentStep;
                    const row = document.getElementById(`node-row-${idx}`);
                    row.className = `flex items-center p-2 rounded-lg border border-transparent transition-all node-lost bg-red-50`;
                    log(`${node.name} 发送 1 但检测到 0，仲裁失败并转为监听模式。`, 'text-red-600');
                } else {
                    activeCount++;
                }
            });

            // Check if only one winner remains
            if (activeCount === 1) {
                const winner = nodes.find(n => n.status === 'active');
                if (winner) finishSim(winner);
            } else if (currentStep === ID_LEN - 1) {
                // All bits compared, if multiple active (should not happen with unique IDs in real CAN)
                log("仲裁结束：多个节点ID相同（不符合CAN规范）或已完成所有位。", "text-orange-500");
                finishSim(null);
            }
        }

        function finishSim(winner) {
            isComplete = true;
            btnNext.disabled = true;
            btnNext.classList.add('opacity-50');
            stepInfo.innerText = "仲裁完成";

            if (winner) {
                const idx = nodes.indexOf(winner);
                winner.status = 'winner';
                const row = document.getElementById(`node-row-${idx}`);
                row.className = `flex items-center p-2 rounded-lg border border-transparent transition-all node-winner bg-green-50 winner-anim`;
                log(`${winner.name} 获得总线访问权，开始发送数据载荷！`, 'text-green-600 font-bold');
                
                // Fill remaining bits of winner
                for(let i=currentStep+1; i<ID_LEN; i++) {
                    const bEl = document.getElementById(`node-${idx}-bit-${i}`);
                    bEl.classList.add(winner.bits[i] === 0 ? 'dominant' : 'recessive');
                    
                    const busEl = document.getElementById(`bus-bit-${i}`);
                    busEl.innerText = winner.bits[i];
                    busEl.className = `w-8 h-8 flex items-center justify-center rounded-sm font-bold border-2 ${winner.bits[i] === 0 ? 'dominant border-blue-900' : 'recessive border-slate-400'}`;
                }
            }
        }

        btnStart.addEventListener('click', () => {
            if (initSim()) {
                // Optional: auto-step or manual
            }
        });

        btnReset.addEventListener('click', () => {
            window.location.reload();
        });

        btnNext.addEventListener('click', runStep);

        // Validation: Hex only
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9a-fA-F]/g, '').slice(0, 3);
            });
        });
    </script>
</body>
</html>
