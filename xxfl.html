<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>线性分类交互模拟</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; overflow-hidden; }
        .canvas-container { position: relative; width: 100%; height: 500px; background: white; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        canvas { cursor: crosshair; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.875rem; margin-bottom: 0.25rem; }
        input[type=range] { width: 100%; height: 6px; appearance: none; background: #e2e8f0; border-radius: 3px; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; cursor: pointer; }
    </style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const katexOptions = {
        delimiters: [
            {left: '\\[', right: '\\]', display: true},
            {left: '\\(', right: '\\)', display: false},
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
        ],
        throwOnError: false,
        strict: false,
        trust: true
    };

    let renderTimeout;
    function safeRender() {
        if (renderTimeout) clearTimeout(renderTimeout);
        renderTimeout = setTimeout(() => {
            renderMathInElement(document.body, katexOptions);
        }, 100);
    }

    renderMathInElement(document.body, katexOptions);

    const observer = new MutationObserver((mutations) => {
        let shouldRender = false;
        mutations.forEach((mutation) => {
            if (mutation.target &&
                mutation.target.className &&
                typeof mutation.target.className === 'string' &&
                mutation.target.className.includes('katex')) {
                return;
            }
            shouldRender = true;
        });

        if (shouldRender) {
            safeRender();
        }
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true
    });

    setInterval(() => {
        const text = document.body.innerText;
        if (text.includes('\\(') || text.includes('$$')) {
            safeRender();
        }
    }, 2000);
});
</script>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- 左侧控制面板 -->
        <div class="space-y-6 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">线性分类模拟</h1>
                <p class="text-slate-500 text-sm mt-1">通过调整参数寻找最佳分割超平面</p>
            </div>

            <div class="space-y-4">
                <div class="p-4 bg-slate-50 rounded-lg border border-slate-100">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">当前决策方程</p>
                    <div id="equation-display" class="text-lg font-mono text-blue-600 text-center">
                        \( w_1x + w_2y + b = 0 \)
                    </div>
                </div>

                <!-- 滑动条控制 -->
                <div class="space-y-4">
                    <div>
                        <div class="slider-label">
                            <span class="text-slate-600 font-medium">权重 \(w_1\)</span>
                            <span id="w1-val" class="font-mono text-blue-600">0.50</span>
                        </div>
                        <input type="range" id="w1-slider" min="-2" max="2" step="0.01" value="0.5">
                    </div>
                    <div>
                        <div class="slider-label">
                            <span class="text-slate-600 font-medium">权重 \(w_2\)</span>
                            <span id="w2-val" class="font-mono text-blue-600">0.80</span>
                        </div>
                        <input type="range" id="w2-slider" min="-2" max="2" step="0.01" value="0.8">
                    </div>
                    <div>
                        <div class="slider-label">
                            <span class="text-slate-600 font-medium">偏置 \(b\)</span>
                            <span id="b-val" class="font-mono text-blue-600">0.00</span>
                        </div>
                        <input type="range" id="b-slider" min="-5" max="5" step="0.1" value="0">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button id="train-btn" class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    自动训练
                </button>
                <button id="reset-btn" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2 px-4 rounded-lg transition-colors">
                    重置数据
                </button>
            </div>

            <div class="pt-4 border-t border-slate-100">
                <div class="flex justify-between items-end mb-1">
                    <span class="text-sm font-medium text-slate-600">分类准确率</span>
                    <span id="accuracy-text" class="text-2xl font-bold text-emerald-500">0%</span>
                </div>
                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div id="accuracy-bar" class="bg-emerald-500 h-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- 右侧可视化区域 -->
        <div class="lg:col-span-2 flex flex-col gap-4">
            <div class="canvas-container overflow-hidden">
                <canvas id="mainCanvas"></canvas>
            </div>
            <div class="bg-blue-50 border-l-4 border-blue-400 p-4 rounded-r-lg">
                <p class="text-sm text-blue-800 leading-relaxed">
                    <strong>交互指南：</strong> 调节滑块改变直线的斜率和位置。直线的一侧被判定为蓝色分类（\(f(x,y) > 0\)），另一侧为红色（\(f(x,y) < 0\)）。点击“自动训练”观察感知机算法如何通过梯度下降最小化分类误差。
                </p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const w1Slider = document.getElementById('w1-slider');
        const w2Slider = document.getElementById('w2-slider');
        const bSlider = document.getElementById('b-slider');
        const w1ValDisp = document.getElementById('w1-val');
        const w2ValDisp = document.getElementById('w2-val');
        const bValDisp = document.getElementById('b-val');
        const accText = document.getElementById('accuracy-text');
        const accBar = document.getElementById('accuracy-bar');
        const equationDisp = document.getElementById('equation-display');
        const trainBtn = document.getElementById('train-btn');
        const resetBtn = document.getElementById('reset-btn');

        // 模拟参数
        let points = [];
        let w = [0.5, 0.8]; // w1, w2
        let b = 0;
        let isTraining = false;
        const scale = 50; // 坐标缩放
        const margin = 5; // 坐标系范围 [-5, 5]

        function init() {
            resize();
            generateData();
            updateFromSliders();
            render();
        }

        function resize() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }

        function generateData() {
            points = [];
            const count = 50;
            // 类别 1: 偏右上方 (y_true = 1)
            for(let i=0; i<count/2; i++) {
                points.push({
                    x: Math.random() * 3 + 0.5,
                    y: Math.random() * 3 + 0.5,
                    label: 1
                });
            }
            // 类别 -1: 偏左下方 (y_true = -1)
            for(let i=0; i<count/2; i++) {
                points.push({
                    x: Math.random() * 3 - 3.5,
                    y: Math.random() * 3 - 3.5,
                    label: -1
                });
            }
            // 随机增加一些离散点增加难度
            points.push({x: 1, y: -2, label: 1});
            points.push({x: -1, y: 2, label: -1});
        }

        function worldToCanvas(x, y) {
            const cx = canvas.width / 2 + x * scale;
            const cy = canvas.height / 2 - y * scale;
            return [cx, cy];
        }

        function updateFromSliders() {
            w[0] = parseFloat(w1Slider.value);
            w[1] = parseFloat(w2Slider.value);
            b = parseFloat(bSlider.value);
            w1ValDisp.innerText = w[0].toFixed(2);
            w2ValDisp.innerText = w[1].toFixed(2);
            bValDisp.innerText = b.toFixed(2);
            updateEquation();
        }

        function updateEquation() {
            const w1Str = w[0].toFixed(2);
            const w2Str = w[1].toFixed(2);
            const bStr = (b >= 0 ? '+' : '') + b.toFixed(2);
            equationDisp.innerHTML = `\\(${w1Str}x ${w[1]>=0?'+':''}${w2Str}y ${bStr} = 0\\)`;
        }

        function calculateAccuracy() {
            let correct = 0;
            points.forEach(p => {
                const val = w[0] * p.x + w[1] * p.y + b;
                const pred = val >= 0 ? 1 : -1;
                if (pred === p.label) correct++;
            });
            const acc = (correct / points.length) * 100;
            accText.innerText = acc.toFixed(1) + '%';
            accBar.style.width = acc + '%';
            if (acc === 100) accText.className = "text-2xl font-bold text-emerald-500";
            else accText.className = "text-2xl font-bold text-blue-500";
        }

        function drawBackground() {
            // 绘制决策区域色块
            const step = 10;
            for(let i=0; i<canvas.width; i+=step) {
                for(let j=0; j<canvas.height; j+=step) {
                    const wx = (i - canvas.width/2) / scale;
                    const wy = (canvas.height/2 - j) / scale;
                    const val = w[0] * wx + w[1] * wy + b;
                    ctx.fillStyle = val >= 0 ? 'rgba(59, 130, 246, 0.05)' : 'rgba(239, 68, 68, 0.05)';
                    ctx.fillRect(i, j, step, step);
                }
            }

            // 绘制网格
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i = -margin; i <= margin; i++) {
                let [x1, y1] = worldToCanvas(i, -margin);
                let [x2, y2] = worldToCanvas(i, margin);
                ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
                [x1, y1] = worldToCanvas(-margin, i);
                [x2, y2] = worldToCanvas(margin, i);
                ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            }
            ctx.stroke();

            // 轴
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 2;
            ctx.beginPath();
            let [oX, oY] = worldToCanvas(0, 0);
            ctx.moveTo(0, oY); ctx.lineTo(canvas.width, oY);
            ctx.moveTo(oX, 0); ctx.lineTo(oX, canvas.height);
            ctx.stroke();
        }

        function drawDecisionLine() {
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 3;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();

            // f(x,y) = w1*x + w2*y + b = 0  => y = (-w1*x - b) / w2
            if (Math.abs(w[1]) > 0.001) {
                const xStart = -margin * 2;
                const xEnd = margin * 2;
                const yStart = (-w[0] * xStart - b) / w[1];
                const yEnd = (-w[0] * xEnd - b) / w[1];
                const [cx1, cy1] = worldToCanvas(xStart, yStart);
                const [cx2, cy2] = worldToCanvas(xEnd, yEnd);
                ctx.moveTo(cx1, cy1);
                ctx.lineTo(cx2, cy2);
            } else {
                // 垂直线 x = -b/w1
                const x = -b / w[0];
                const [cx, cy1] = worldToCanvas(x, -margin*2);
                const [cx_, cy2] = worldToCanvas(x, margin*2);
                ctx.moveTo(cx, cy1);
                ctx.lineTo(cx, cy2);
            }
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawPoints() {
            points.forEach(p => {
                const [cx, cy] = worldToCanvas(p.x, p.y);
                const val = w[0] * p.x + w[1] * p.y + b;
                const pred = val >= 0 ? 1 : -1;
                
                // 绘制外圈（真实标签）
                ctx.beginPath();
                ctx.arc(cx, cy, 8, 0, Math.PI * 2);
                ctx.fillStyle = p.label === 1 ? '#3b82f6' : '#ef4444';
                ctx.fill();

                // 绘制内圈（预测结果，错误则显示白色中心）
                if (pred !== p.label) {
                    ctx.beginPath();
                    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                }
            });
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawDecisionLine();
            drawPoints();
            calculateAccuracy();
        }

        // 感知机训练算法
        async function train() {
            if(isTraining) return;
            isTraining = true;
            trainBtn.disabled = true;
            trainBtn.classList.add('opacity-50');
            
            const learningRate = 0.05;
            const epochs = 100;
            
            for(let e = 0; e < epochs; e++) {
                let misclassified = 0;
                for(let p of points) {
                    const score = w[0] * p.x + w[1] * p.y + b;
                    if (p.label * score <= 0) {
                        // 梯度更新
                        w[0] += learningRate * p.label * p.x;
                        w[1] += learningRate * p.label * p.y;
                        b += learningRate * p.label;
                        misclassified++;
                        
                        // 同步滑动条
                        w1Slider.value = w[0];
                        w2Slider.value = w[1];
                        bSlider.value = b;
                        updateFromSliders();
                        render();
                        await new Promise(r => setTimeout(r, 20));
                    }
                }
                if(misclassified === 0) break;
            }
            
            isTraining = false;
            trainBtn.disabled = false;
            trainBtn.classList.remove('opacity-50');
        }

        // 事件监听
        w1Slider.addEventListener('input', () => { updateFromSliders(); render(); });
        w2Slider.addEventListener('input', () => { updateFromSliders(); render(); });
        bSlider.addEventListener('input', () => { updateFromSliders(); render(); });
        resetBtn.addEventListener('click', () => { generateData(); render(); });
        trainBtn.addEventListener('click', train);
        window.addEventListener('resize', () => { resize(); render(); });

        init();
    </script>
</body>
</html>
